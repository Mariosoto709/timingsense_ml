name: Tests Unitarios y Artefactos

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install pytest pytest-cov pandas numpy scikit-learn xgboost joblib boto3

    - name: Run unit tests
      run: |
        pytest tests/unit/ -v

    # =============================================================
    # EMPAQUETAR ARTEFACTOS (solo para develop)
    # =============================================================
    - name: Package artifacts
      if: github.ref == 'refs/heads/develop'
      run: |
        # Empaquetar Lambdas
        cd lambda/lambda_bdd_races
        zip -r ../../lambda-bdd-races.zip .
        cd ../..
        
        cd lambda/lambda_procesar_salida_glue
        zip -r ../../lambda-procesar-salida-glue.zip .
        cd ../..
        
        # Empaquetar scripts de SageMaker
        cd sagemaker
        tar -czf ../sagemaker-scripts.tar.gz train_interpolacion.py train_prediccion.py
        cd ..
        
        # =============================================================
        # NUEVO: Empaquetar scripts de Glue (todos juntos)
        # =============================================================
        cd glue
        zip -r ../glue-scripts.zip glue_utils.py athena_utils.py create_training_table.py
        cd ..
        
        # Mostrar archivos creados
        ls -la *.zip *.tar.gz

    # =============================================================
    # SUBIR ARTEFACTOS A S3 (solo para develop)
    # =============================================================
    - name: Upload to S3
      if: github.ref == 'refs/heads/develop'
      run: |
        # Subir Lambdas
        aws s3 cp lambda-bdd-races.zip s3://timingsense-artifacts/builds/${{ github.sha }}/lambda-bdd-races.zip
        aws s3 cp lambda-procesar-salida-glue.zip s3://timingsense-artifacts/builds/${{ github.sha }}/lambda-procesar-salida-glue.zip
        
        # Subir scripts SageMaker
        aws s3 cp sagemaker-scripts.tar.gz s3://timingsense-artifacts/builds/${{ github.sha }}/sagemaker-scripts.tar.gz
        
        # =============================================================
        # NUEVO: Subir scripts de Glue (ZIP completo y archivos sueltos)
        # =============================================================
        aws s3 cp glue-scripts.zip s3://timingsense-artifacts/builds/${{ github.sha }}/glue-scripts.zip
        
        # También subir archivos sueltos para fácil acceso
        aws s3 cp glue/glue_utils.py s3://timingsense-scripts/glue/glue_utils.py
        aws s3 cp glue/athena_utils.py s3://timingsense-scripts/glue/athena_utils.py
        aws s3 cp glue/create_training_table.py s3://timingsense-scripts/glue/create_training_table.py
        
        # Actualizar "latest"
        aws s3 cp lambda-bdd-races.zip s3://timingsense-artifacts/builds/latest/lambda-bdd-races.zip
        aws s3 cp lambda-procesar-salida-glue.zip s3://timingsense-artifacts/builds/latest/lambda-procesar-salida-glue.zip
        aws s3 cp sagemaker-scripts.tar.gz s3://timingsense-artifacts/builds/latest/sagemaker-scripts.tar.gz
        aws s3 cp glue-scripts.zip s3://timingsense-artifacts/builds/latest/glue-scripts.zip
        
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}